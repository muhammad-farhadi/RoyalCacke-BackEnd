{% extends "sqladmin/create.html" %}

{% block head %}
{{ super() }}
<!-- CSS ابزار کراپ عکس -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
<style>
    /* استایل اختصاصی پاپ‌آ‌پ مستقل بدون وابستگی به بوت‌استرپ و تبلر */
    #customCropOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        z-index: 999999;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .custom-crop-box {
        background: #fff;
        border-radius: 8px;
        max-width: 750px;
        width: 90%;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }

    .custom-crop-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: #212529;
        color: #fff;
    }

    .custom-crop-body {
        padding: 20px;
        max-height: 450px;
        overflow: hidden;
        text-align: center;
    }

    .custom-crop-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 15px 20px;
        background: #f8f9fa;
        border-top: 1px solid #dee2e6;
    }

    #cropper-preview-img {
        max-width: 100%;
        max-height: 400px;
        display: block;
        margin: 0 auto;
    }

    /* 🔒 قفل اول ضد باگ موبایل: غیرقابل انتخاب کردن لیبل‌ها و المان‌های ساختاری فرم */
    .form-label,
    .form-hint,
    .input-group-text,
    label,
    .btn:not(.btn-primary):not(#crop-save-btn),
    .nav-link,
    .card-title {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
    }

    /* باز نگه داشتن دسترسی انتخاب متن و فوکوس برای فیلدهای ورودی واقعی */
    input[type="text"],
    input[type="number"],
    textarea,
    .form-control {
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
    }
</style>
{% endblock %}

{% block content %}
{{ super() }}

<!-- سیستم پروگرس بار بدون تغییر لود می‌شود -->
{% include "upload_progress.html" %}

<!-- پاپ‌آ‌پ اختصاصی ابزار کراپ -->
<div id="customCropOverlay">
    <div class="custom-crop-box">
        <div class="custom-crop-header">
            <h5 class="m-0" style="font-size: 16px;"><i class="fa-solid fa-crop-simple me-2"></i> تنظیم و برش منطقه
                دلخواه عکس</h5>
            <button type="button" id="custom-close-x"
                    style="border:none; background:none; color:#fff; font-size:24px; cursor:pointer; line-height:1;">
                &times;
            </button>
        </div>
        <div class="custom-crop-body">
            <img id="cropper-preview-img" src="" alt="Preview">
        </div>
        <div class="custom-crop-footer">
            <button type="button" id="custom-cancel-btn" class="btn btn-secondary">انصراف</button>
            <button type="button" id="crop-save-btn" class="btn btn-primary"><i class="fa-solid fa-scissors me-1"></i>
                برش و اعمال تغییرات
            </button>
        </div>
    </div>
</div>

<!-- اسکریپت اصلی ابزار کراپ و منطق هوشمند ابعاد -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        let cropper = null;
        let currentInput = null;
        let activeSpec = null;

        const overlay = document.getElementById('customCropOverlay');
        const previewImg = document.getElementById('cropper-preview-img');
        const saveBtn = document.getElementById('crop-save-btn');
        const cancelBtn = document.getElementById('custom-cancel-btn');
        const closeX = document.getElementById('custom-close-x');

        const cropSpecs = {
            "image_url": {aspect: 13 / 15, width: 520, height: 600},
            "banner_image": {aspect: 16 / 9, width: 960, height: 540},
            "cover_url": {aspect: 19 / 13, width: 380, height: 260}
        };

        function closeCropModal() {
            overlay.style.display = 'none';

            // قفل کردن دسترسی مرورگر موبایل به این پاپ‌آپ در زمان بسته بودن
            overlay.style.pointerEvents = 'none';
            overlay.style.userSelect = 'none';
            overlay.style.webkitUserSelect = 'none';

            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }

        cancelBtn.addEventListener('click', closeCropModal);
        closeX.addEventListener('click', closeCropModal);

        document.querySelectorAll('input[type="file"]').forEach(input => {
            input.addEventListener('change', function (e) {
                let specName = input.name;

                if (specName === "image_url" && document.querySelector('input[name="subtitle"]')) {
                    specName = "banner_image";
                }

                const spec = cropSpecs[specName];
                if (!spec) return;

                const files = e.target.files;
                if (files && files.length > 0) {
                    currentInput = input;
                    activeSpec = spec;
                    const file = files[0];
                    if (!file.type.startsWith('image/')) return;

                    const reader = new FileReader();
                    reader.onload = function (event) {
                        previewImg.src = event.target.result;

                        // باز کردن پاپ‌آپ و آزاد کردن موقت دسترسی تاچ
                        overlay.style.display = 'flex';
                        overlay.style.pointerEvents = 'auto';
                        overlay.style.userSelect = 'auto';
                        overlay.style.webkitUserSelect = 'auto';

                        cropper = new Cropper(previewImg, {
                            aspectRatio: spec.aspect,
                            viewMode: 1,
                            dragMode: 'move',
                            background: false,
                            autoCropArea: 1,
                            restore: false,
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        saveBtn.addEventListener('click', function () {
            if (!cropper || !currentInput || !activeSpec) return;

            const canvas = cropper.getCroppedCanvas({
                width: activeSpec.width,
                height: activeSpec.height,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            });

            canvas.toBlob(function (blob) {
                const originalFileName = currentInput.files[0].name;
                const croppedFile = new File([blob], originalFileName, {type: 'image/jpeg'});

                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(croppedFile);
                currentInput.files = dataTransfer.files;

                closeCropModal();
            }, 'image/jpeg', 0.9);
        });

        // 🔒 قفل دوم ضد باگ موبایل: شنود رویداد پیست و اجبار به تزریق متن کاملاً خام
        document.querySelectorAll('textarea, input[type="text"]').forEach(element => {
            element.addEventListener('paste', function (e) {
                const plainText = (e.clipboardData || window.clipboardData).getData('text/plain');

                if (plainText) {
                    e.preventDefault();

                    const startPos = this.selectionStart;
                    const endPos = this.selectionEnd;
                    const currentVal = this.value;

                    this.value = currentVal.substring(0, startPos) + plainText + currentVal.substring(endPos);

                    this.selectionStart = this.selectionEnd = startPos + plainText.length;

                    this.dispatchEvent(new Event('input', {bubbles: true}));
                    this.dispatchEvent(new Event('change', {bubbles: true}));
                }
            });
        });
    });
</script>
{% endblock %}
