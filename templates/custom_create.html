{% extends "sqladmin/create.html" %}

{% block head %}
{{ super() }}
<!-- CSS ابزار کراپ عکس -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
<!-- 📅 CSS رسمی و معتبر تقویم جلالی -->
<link rel="stylesheet" href="https://unpkg.com/@majidh1/jalalidatepicker/dist/jalalidatepicker.min.css">

<style>
    #customCropOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        z-index: 999999;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .custom-crop-box {
        background: #fff;
        border-radius: 8px;
        max-width: 750px;
        width: 90%;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }

    .custom-crop-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: #212529;
        color: #fff;
    }

    .custom-crop-body {
        padding: 20px;
        max-height: 450px;
        overflow: hidden;
        text-align: center;
    }

    .custom-crop-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 15px 20px;
        background: #f8f9fa;
        border-top: 1px solid #dee2e6;
    }

    #cropper-preview-img {
        max-width: 100%;
        max-height: 400px;
        display: block;
        margin: 0 auto;
    }

    /* 🔒 قفل ضد باگ کپی-پیست موبایل */
    .form-label,
    .form-hint,
    .input-group-text,
    label,
    .btn:not(.btn-primary):not(#crop-save-btn),
    .nav-link,
    .card-title {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    .form-control {
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
    }

    /* 📅 تضمین قرارگیری تقویم روی بالاترین لایه قالب ادمین */
    jdp-container {
        font-family: inherit !important;
        direction: rtl !important;
        z-index: 999999999 !important;
    }
</style>
{% endblock %}

{% block content %}
{{ super() }}

{% include "upload_progress.html" %}

<div id="customCropOverlay">
    <div class="custom-crop-box">
        <div class="custom-crop-header">
            <h5 class="m-0" style="font-size: 16px;"><i class="fa-solid fa-crop-simple me-2"></i> تنظیم و برش منطقه
                دلخواه عکس</h5>
            <button type="button" id="custom-close-x"
                    style="border:none; background:none; color:#fff; font-size:24px; cursor:pointer; line-height:1;">
                &times;
            </button>
        </div>
        <div class="custom-crop-body">
            <img id="cropper-preview-img" src="" alt="Preview">
        </div>
        <div class="custom-crop-footer">
            <button type="button" id="custom-cancel-btn" class="btn btn-secondary">انصراف</button>
            <button type="button" id="crop-save-btn" class="btn btn-primary"><i class="fa-solid fa-scissors me-1"></i>
                برش و اعمال تغییرات
            </button>
        </div>
    </div>
</div>

<!-- 📅 اسکریپت‌های ریاضی و پکیج رسمی تقویم جلالی -->
<script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.js"></script>
<script src="https://unpkg.com/@majidh1/jalalidatepicker/dist/jalalidatepicker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        let cropper = null;
        let currentInput = null;
        let activeSpec = null;

        const overlay = document.getElementById('customCropOverlay');
        const previewImg = document.getElementById('cropper-preview-img');
        const saveBtn = document.getElementById('crop-save-btn');
        const cancelBtn = document.getElementById('custom-cancel-btn');
        const closeX = document.getElementById('custom-close-x');

        const cropSpecs = {
            "image_url": {aspect: 13 / 15, width: 520, height: 600},
            "banner_image": {aspect: 16 / 9, width: 960, height: 540},
            "cover_url": {aspect: 19 / 13, width: 380, height: 260}
        };

        function gregToShamsiStr(gStr) {
            if (!gStr) return '';
            const cleanStr = gStr.replace('T', ' ');
            const parts = cleanStr.split(' ');
            const dateParts = parts[0].split('-');
            const timePart = parts[1] ? parts[1].substring(0, 5) : '00:00';
            const gy = parseInt(dateParts[0], 10);
            const gm = parseInt(dateParts[1], 10);
            const gd = parseInt(dateParts[2], 10);
            if (isNaN(gy) || isNaN(gm) || isNaN(gd)) return '';
            const j = jalaali.toJalaali(gy, gm, gd);
            return `${j.jy}/${String(j.jm).padStart(2, '0')}/${String(j.jd).padStart(2, '0')} ${timePart}`;
        }

        function shamsiToGregStr(sStr) {
            if (!sStr || !sStr.includes('/')) return '';
            const parts = sStr.trim().split(' ');
            const dateParts = parts[0].split('/');
            const timePart = parts[1] || '00:00';
            const jy = parseInt(dateParts[0], 10);
            const jm = parseInt(dateParts[1], 10);
            const jd = parseInt(dateParts[2], 10);
            if (isNaN(jy) || isNaN(jm) || isNaN(jd)) return '';
            const g = jalaali.toGregorian(jy, jm, jd);
            // 🔥 اصلاح بسیار مهم: استفاده از فاصله به جای T برای رفع خطای 400 در پایتون
            return `${g.gy}-${String(g.gm).padStart(2, '0')}-${String(g.gd).padStart(2, '0')} ${timePart}:00`;
        }

        // 📅 مقداردهی اینپوت‌های ایزوله و شلیک مستقیم کلیک تقویم
        function initIsolatedJalaliFields() {
            const targetNames = ['discount_start', 'discount_end', 'valid_until'];

            targetNames.forEach(name => {
                const originalField = document.querySelector(`input[name="${name}"]`);
                if (!originalField || originalField.hasAttribute('data-shadow-bound')) return;

                if (originalField._flatpickr) {
                    originalField._flatpickr.destroy();
                }

                // اگر از قبل مقدار با کاراکتر T آمده، آن را در لود اولیه اصلاح کن
                if (originalField.value && originalField.value.includes('T')) {
                    originalField.value = originalField.value.replace('T', ' ');
                }

                originalField.style.setProperty('display', 'none', 'important');
                originalField.setAttribute('data-shadow-bound', 'true');

                const shadowInput = document.createElement('input');
                shadowInput.type = 'text';
                shadowInput.className = 'form-control';
                shadowInput.placeholder = 'انتخاب تاریخ و ساعت شمسی...';
                shadowInput.setAttribute('data-jdp', '');
                shadowInput.setAttribute('autocomplete', 'off');
                shadowInput.style.cursor = 'pointer';

                if (originalField.value) {
                    shadowInput.value = gregToShamsiStr(originalField.value);
                }

                originalField.parentNode.insertBefore(shadowInput, originalField);

                const openCalendarDirectly = function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (window.jalaliDatepicker) {
                        window.jalaliDatepicker.show(shadowInput);
                    }
                };

                shadowInput.addEventListener('click', openCalendarDirectly);
                shadowInput.addEventListener('focus', openCalendarDirectly);

                shadowInput.addEventListener('change', function (e) {
                    e.stopPropagation();
                    if (this.value && this.value.includes('/')) {
                        originalField.value = shamsiToGregStr(this.value);
                    } else {
                        originalField.value = '';
                    }
                    originalField.dispatchEvent(new Event('input', {bubbles: true}));
                    originalField.dispatchEvent(new Event('change', {bubbles: true}));
                });
            });

            if (window.jalaliDatepicker) {
                window.jalaliDatepicker.startWatch({time: true, hasSecond: false});
            }
        }

        initIsolatedJalaliFields();
        setTimeout(initIsolatedJalaliFields, 50);
        setTimeout(initIsolatedJalaliFields, 250);

        // 🛡️ حل فوق‌العاده مهم باگ ارور 400 دیتابیس با قابلیت اولویت اول (True)
        const mainForm = document.querySelector('form');
        if (mainForm) {
            mainForm.addEventListener('submit', function (e) {
                const targetNames = ['discount_start', 'discount_end', 'valid_until'];
                targetNames.forEach(name => {
                    const hiddenField = document.querySelector(`input[name="${name}"]`);
                    if (hiddenField) {
                        if (hiddenField.value.trim() === '') {
                            hiddenField.disabled = true; // اگر خالی است کلا فرستاده نشود تا None شود
                        } else if (hiddenField.value.includes('T')) {
                            hiddenField.value = hiddenField.value.replace('T', ' '); // تضمین حذف T در ثانیه آخر سابمیت
                        }
                    }
                });
            }, true); // فاز کپچرینگ برای اجرا پیش از اسکریپت آپلود عکس
        }

        function closeCropModal() {
            overlay.style.display = 'none';
            overlay.style.pointerEvents = 'none';
            overlay.style.userSelect = 'none';
            overlay.style.webkitUserSelect = 'none';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }

        cancelBtn.addEventListener('click', closeCropModal);
        closeX.addEventListener('click', closeCropModal);

        document.querySelectorAll('input[type="file"]').forEach(input => {
            input.addEventListener('change', function (e) {
                let specName = input.name;
                if (specName === "image_url" && document.querySelector('input[name="subtitle"]')) {
                    specName = "banner_image";
                }
                const spec = cropSpecs[specName];
                if (!spec) return;

                const files = e.target.files;
                if (files && files.length > 0) {
                    currentInput = input;
                    activeSpec = spec;
                    const file = files[0];
                    if (!file.type.startsWith('image/')) return;

                    const reader = new FileReader();
                    reader.onload = function (event) {
                        previewImg.src = event.target.result;
                        overlay.style.display = 'flex';
                        overlay.style.pointerEvents = 'auto';
                        overlay.style.userSelect = 'auto';
                        overlay.style.webkitUserSelect = 'auto';

                        cropper = new Cropper(previewImg, {
                            aspectRatio: spec.aspect,
                            viewMode: 1,
                            dragMode: 'move',
                            background: false,
                            autoCropArea: 1,
                            restore: false,
                        });
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        saveBtn.addEventListener('click', function () {
            if (!cropper || !currentInput || !activeSpec) return;
            const canvas = cropper.getCroppedCanvas({
                width: activeSpec.width,
                height: activeSpec.height,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            });

            canvas.toBlob(function (blob) {
                const originalFileName = currentInput.files[0].name;
                const croppedFile = new File([blob], originalFileName, {type: 'image/jpeg'});
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(croppedFile);
                currentInput.files = dataTransfer.files;
                closeCropModal();
            }, 'image/jpeg', 0.9);
        });

        document.querySelectorAll('textarea, input[type="text"]').forEach(element => {
            element.addEventListener('paste', function (e) {
                const plainText = (e.clipboardData || window.clipboardData).getData('text/plain');
                if (plainText) {
                    e.preventDefault();
                    const startPos = this.selectionStart;
                    const endPos = this.selectionEnd;
                    const currentVal = this.value;
                    this.value = currentVal.substring(0, startPos) + plainText + currentVal.substring(endPos);
                    this.selectionStart = this.selectionEnd = startPos + plainText.length;
                    this.dispatchEvent(new Event('input', {bubbles: true}));
                    this.dispatchEvent(new Event('change', {bubbles: true}));
                }
            });
        });
    });
</script>
{% endblock %}
