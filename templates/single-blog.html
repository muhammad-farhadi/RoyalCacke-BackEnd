<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }} | رویال کیک</title>
    <link rel="stylesheet" href="/static/css/all.min.css?v=6.4.0">
    <link rel="stylesheet" href="/static/css/single-blog.css">
</head>
<body>

<div class="article-container">

    <div class="back-btn-box">
        <a href="/blog" class="back-to-blogs"><i class="fas fa-arrow-right"></i> بازگشت به مقالات</a>
    </div>

    <img src="{{ article.image_url if article.image_url else '/static/img/default-blog.png' }}"
         alt="{{ article.title }}" class="article-banner">

    <div class="article-content">
        <div class="article-meta">
            <span><i class="far fa-user"></i> نویسنده: ادمین</span>
            <span><i class="far fa-calendar-alt"></i> {{ article.created_at | jalali }}</span>
        </div>

        <h1>{{ article.title }}</h1>

        <div class="article-text">
            <!-- استفاده از فیلتر safe برای اینکه کدهای HTML ذخیره شده در دیتابیس به درستی رندر شوند -->
            {{ article.content | safe }}
        </div>

        <div class="comments-section">
            <h3>دیدگاه شما</h3>
            <form class="comment-form"
                  onsubmit="event.preventDefault(); alert('نظر شما با موفقیت ثبت شد و پس از تایید نمایش داده می‌شود.');">
                <textarea placeholder="نظر یا سوال خود را درباره این مقاله بنویسید..." required></textarea>
                <button type="submit" class="btn-comment">ثبت دیدگاه</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
